<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">

  <!-- world background -->
  <rect x="0" y="0" width="800" height="640" fill="#f5f5f5"/>

  <!-- top box -->
  <rect x="20" y="20" width="760" height="220" rx="6" ry="6"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- top box files -->
  <g font-family="monospace" font-size="15" fill="#222">
    <text x="60"  y="130">☐ README.md</text>
    <text x="220" y="130">☐ main.py</text>
    <text x="360" y="130">☐ config.example.yaml</text>
    <text x="580" y="130">☐ uv.lock</text>
  </g>

  <!-- top box caption -->
  <text x="400" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">repository</text>

  <!-- blue (left) box -->
  <rect x="100" y="270" width="360" height="280" rx="6" ry="6"
        fill="rgba(100,140,220,0.15)" stroke="#3355aa" stroke-width="2"/>

  <!-- red (right) box -->
  <rect x="300" y="310" width="360" height="200" rx="6" ry="6"
        fill="rgba(220,100,100,0.15)" stroke="#aa3333" stroke-width="2"/>

  <!-- left-only files -->
  <g font-family="monospace" font-size="14" fill="#222">
    <text x="120" y="340">☐ __pycache__</text>
    <text x="120" y="375">☐ .uv-cache</text>
    <text x="120" y="410">☐ .ruff_cache</text>
  </g>

  <!-- intersection files -->
  <g font-family="monospace" font-size="14" fill="#222">
    <text x="315" y="390">☐ data/</text>
    <text x="315" y="425">☐ config.yaml</text>
  </g>

  <!-- right-only files -->
  <g font-family="monospace" font-size="14" fill="#222">
    <text x="475" y="340">☐ CLAUDE.md</text>
    <text x="475" y="375">☐ scratch.py</text>
    <text x="475" y="410">☐ notes.txt</text>
  </g>

  <!-- captions below boxes (boxes bottom at y=550) -->
  <g font-family="sans-serif" font-size="13" font-weight="bold">
    <text x="110" y="565" text-anchor="start"  fill="#3355aa">.gitignore</text>
    <text x="380" y="525" text-anchor="middle" fill="#7733aa">user data</text>
    <text x="650" y="525" text-anchor="end"    fill="#aa3333">untracked</text>
  </g>
  <text x="400" y="620" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#111">py-project/</text>

</svg>
