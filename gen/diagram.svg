<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
<style>
  :root {
    --bg:          #e7e2d8;
    --ink:         #222;
    --ink-strong:  #111;
    --border:      #333;
    --blue-stroke: #3355aa;
    --blue-fill:   rgba(100,140,220,0.15);
    --red-stroke:  #aa3333;
    --red-fill:    rgba(220,100,100,0.15);
    --green-stroke:#2b8a57;
    --green-fill:  rgba(70,170,110,0.12);
    --green-cap:   #2b8a57;
    --blue-cap:    #3355aa;
    --red-cap:     #aa3333;
    --purple-cap:  #7733aa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #1a1f27;
      --ink:         #cdd9e5;
      --ink-strong:  #e6edf3;
      --border:      #8b949e;
      --blue-stroke: #6688dd;
      --blue-fill:   rgba(100,140,220,0.18);
      --red-stroke:  #dd6666;
      --red-fill:    rgba(220,100,100,0.18);
      --green-stroke:#6fd19a;
      --green-fill:  rgba(95,190,135,0.14);
      --green-cap:   #6fd19a;
      --blue-cap:    #6688dd;
      --red-cap:     #dd6666;
      --purple-cap:  #bb77ee;
    }
  }
</style>

  <!-- world background -->
  <rect x="0" y="0" width="800" height="640" fill="var(--bg)"/>
  <rect x="1" y="1" width="798" height="638" rx="8" ry="8"
        fill="none" stroke="var(--border)" stroke-width="2"/>

  <!-- top box: repository -->
  <rect x="44" y="60" width="712" height="160" rx="6" ry="6"
        fill="var(--green-fill)" stroke="var(--green-stroke)" stroke-width="2"/>

  <!-- repository header -->
  <text x="400" y="46" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold"
        fill="var(--green-cap)">repository</text>

  <!-- top box files -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="15" fill="var(--ink)">
    <text x="100"  y="148">README.md</text>
    <text x="270" y="148">main.py</text>
    <text x="420" y="148">config.example.yaml</text>
    <text x="650" y="148">uv.lock</text>
  </g>

  <!-- .gitignore header -->
  <text x="210" y="288" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold"
        fill="var(--blue-cap)">.gitignore</text>

  <!-- blue (left) box -->
  <rect x="100" y="296" width="360" height="240" rx="6" ry="6"
        fill="var(--blue-fill)" stroke="var(--blue-stroke)" stroke-width="2"/>

  <!-- user data header -->
  <text x="400" y="328" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold"
        fill="var(--purple-cap)">user data</text>

  <!-- untracked header -->
  <text x="560" y="328" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold"
        fill="var(--red-cap)">untracked</text>

  <!-- red (right) box -->
  <rect x="300" y="336" width="360" height="200" rx="6" ry="6"
        fill="var(--red-fill)" stroke="var(--red-stroke)" stroke-width="2"/>

  <!-- left-only files (gitignored, disposable) -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="15" fill="var(--ink)">
    <text x="120" y="370">__pycache__/</text>
    <text x="120" y="400">.uv-cache/</text>
    <text x="120" y="430">.ruff_cache/</text>
  </g>

  <!-- intersection files (user data in gitignore overlap) -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="15" fill="var(--ink)">
    <text x="330" y="400">data/</text>
    <text x="330" y="430">config.yaml</text>
  </g>

  <!-- right-only files (untracked, not gitignored) -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="15" fill="var(--ink)">
    <text x="490" y="370">CLAUDE.md</text>
    <text x="490" y="400">scratch.py</text>
    <text x="490" y="430">notes.txt</text>
  </g>

  <!-- world caption -->
  <text x="400" y="600" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="bold"
        fill="var(--ink-strong)">py-project/</text>

</svg>
